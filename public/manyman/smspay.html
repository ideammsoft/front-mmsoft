<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>엠엠소프트 - 문자 충전</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;max-width:502px;overflow-x:hidden}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#eef2f7;padding:5px;font-size:11px}
.hd{background:#1a73e8;color:#fff;text-align:center;padding:5px;border-radius:4px 4px 0 0;font-size:12px;font-weight:bold}
.card{background:#fff;border:1px solid #d0d8e8;border-radius:0 0 4px 4px;padding:7px}
.notice{background:#e8f0fe;border-left:3px solid #1a73e8;border-radius:3px;padding:4px 6px;margin-bottom:6px;font-size:10px;color:#3c4858;line-height:1.6}
.lbl{font-size:10px;font-weight:bold;color:#555;margin-bottom:2px}
.aw{position:relative;margin-bottom:4px}
.ai{width:100%;padding:4px 24px 4px 6px;font-size:16px;font-weight:bold;color:#1a73e8;border:2px solid #d2d9e6;border-radius:4px;text-align:right;outline:none;font-family:'맑은 고딕','Malgun Gothic',sans-serif}
.ai:focus{border-color:#1a73e8}
.au{position:absolute;right:5px;top:50%;margin-top:-5px;font-size:10px;color:#888}
.err{display:none;color:#e53e3e;font-size:10px;margin-bottom:3px}
.qg{width:100%;border-collapse:collapse;margin-bottom:3px}
.qg td{width:25%;padding:0 1px}
.qg td:first-child{padding-left:0}
.qg td:last-child{padding-right:0}
.qb{width:100%;padding:3px 0;background:#f7f8fc;border:1px solid #d2d9e6;border-radius:3px;font-size:10px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-weight:bold;color:#444;cursor:pointer}
.qb:hover{background:#e8f0fe;border-color:#1a73e8;color:#1a73e8}
.rb{width:100%;padding:3px;background:#fff;border:1px dashed #ccc;border-radius:3px;font-size:10px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;color:#999;cursor:pointer;margin-bottom:5px}
.rb:hover{border-color:#e53e3e;color:#e53e3e}
.pb{width:100%;padding:7px;background:#1a73e8;color:#fff;border:none;border-radius:4px;font-size:13px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-weight:bold;cursor:pointer}
.pb:hover{background:#1557b0}
.pb:disabled{background:#94a3b8;cursor:not-allowed}
/* 결과 화면 */
#resultArea{display:none;text-align:center;padding:16px 8px}
.ri{font-size:2.5rem;margin-bottom:8px}
.rt{font-size:14px;font-weight:bold;margin:0 0 8px}
.rm{font-size:11px;color:#555;margin:0 0 12px}
.ok .rt{color:#22c55e}
.fail .rt{color:#ef4444}
.retryBtn{width:100%;padding:7px;background:#f1f5f9;color:#475569;border:none;border-radius:4px;font-size:12px;font-weight:bold;cursor:pointer}
.retryBtn:hover{background:#e2e8f0}
</style>
</head>
<body>
<div class="hd">MMSoft &nbsp; 문자메시지 충전</div>
<div class="card">
  <!-- 충전 폼 -->
  <div id="payArea">
    <div class="notice">
      * 충전방식은 카드결재와 무통장입금만 가능합니다.<br>
      * 한번에 최대 5000건까지 발송가능합니다.<br>
      * 문자 메시지를 발송하시기 위해서는 요금이 충전되어 있어야합니다.<br>
      * 최소 결제 단위는 11,000원입니다.<br>
      * 무통장입금을 원하시는 분들은 국민 421701-01-138933 이기성(엠엠소프트)로 입금해주시고
      커뮤니티 게시판에 충전요청 등록 부탁드립니다(비밀글 선호).
    </div>
    <div class="lbl">충전 금액 (최소 11,000원. 부가세를 제외한 금액 충전)</div>
    <div class="aw">
      <input type="text" id="price" class="ai" value="11,000">
      <span class="au">원</span>
    </div>
    <p class="err" id="err"></p>
    <table class="qg"><tr>
      <td><button type="button" class="qb" onclick="add(11000)">+1만</button></td>
      <td><button type="button" class="qb" onclick="add(55000)">+5만</button></td>
      <td><button type="button" class="qb" onclick="add(110000)">+10만</button></td>
      <td><button type="button" class="qb" onclick="add(550000)">+50만</button></td>
    </tr></table>
    <button type="button" class="rb" onclick="rst()">금액 초기화</button>
    <button type="button" class="pb" id="payBtn" onclick="go()">결&nbsp;&nbsp;제</button>
  </div>
  <!-- 결과 화면 -->
  <div id="resultArea">
    <div class="ri" id="ri"></div>
    <p class="rt" id="rt"></p>
    <p class="rm" id="rm"></p>
    <button type="button" class="retryBtn" onclick="retry()">다시 충전하기</button>
  </div>
</div>
<script>
function gp(n){var s=window.location.search.substring(1).split('&');for(var i=0;i<s.length;i++){var p=s[i].split('=');if(decodeURIComponent(p[0])===n)return p.length>1?decodeURIComponent(p[1].replace(/\+/g,' ')):''}return ''}
var uid=gp('id'),ph=gp('phone'),em=gp('email')||'man@mmsoft.co.kr';

function getNum(){return parseInt((document.getElementById('price').value+'').replace(/,/g,''),10)||0}
function setNum(v){document.getElementById('price').value=v.toLocaleString('ko-KR')}

function add(v){setNum(getNum()+v);he()}
function rst(){setNum(11000);he()}
function he(){var el=document.getElementById('err');el.style.display='none';el.innerHTML=''}

function go(){
  var price=getNum(),el=document.getElementById('err');
  if(!price||price<11000){el.innerHTML='최소 결제 금액은 11,000원입니다.';el.style.display='block';return}
  if(price%11000!==0){el.innerHTML='11,000원 단위로 입력해 주세요.';el.style.display='block';return}

  document.getElementById('payBtn').disabled=true;
  document.getElementById('payBtn').textContent='결제 처리 중...';

  var payUrl='/manyman/authfrm.html?goods=SMS&price='+price+'&id='+encodeURIComponent(uid)+'&email='+encodeURIComponent(em)+'&phone='+encodeURIComponent(ph);
  var popup=window.open(payUrl,'kspaypopup','width=502,height=600,scrollbars=yes');

  var timer=setInterval(function(){
    if(popup&&popup.closed){
      clearInterval(timer);
      document.getElementById('payBtn').disabled=false;
      document.getElementById('payBtn').textContent='결  제';
    }
  },1000);
}

// authfrm.html에서 paymentResult 콜백 호출
function paymentResult(ok, amt, msg){
  document.getElementById('payArea').style.display='none';
  var ra=document.getElementById('resultArea');
  ra.style.display='block';
  ra.className=ok?'ok':'fail';
  document.getElementById('ri').textContent=ok?'✅':'❌';
  document.getElementById('rt').textContent=ok?'충전이 완료되었습니다':'충전이 완료되지 않았습니다';
  var rmEl=document.getElementById('rm');
  if(ok&&amt){rmEl.textContent=amt+'원 충전 처리되었습니다.'}
  else if(!ok&&msg){rmEl.textContent=msg}
  else{rmEl.textContent=''}
}

function retry(){
  document.getElementById('resultArea').style.display='none';
  document.getElementById('payArea').style.display='block';
  rst();
  document.getElementById('payBtn').disabled=false;
  document.getElementById('payBtn').textContent='결  제';
}

document.getElementById('price').onkeypress=function(e){
  var ev=e||window.event,k=ev.keyCode||ev.which;
  if(k===13){go();return false}
  if(k<48||k>57){ev.returnValue=false;return false}
};
</script>
</body>
</html>
