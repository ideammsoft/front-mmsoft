<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>엠엠소프트 - 카드 결제</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;max-width:502px;overflow-x:hidden}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#eef2f7;padding:5px;font-size:11px}
.hd{background:#1a73e8;color:#fff;text-align:center;padding:5px;border-radius:4px 4px 0 0;font-size:12px;font-weight:bold}
.card{background:#fff;border:1px solid #d0d8e8;border-radius:0 0 4px 4px;padding:8px}
.obox{background:#f7f8fc;border:1px solid #e2e8f0;border-radius:4px;padding:7px 9px;margin-bottom:8px}
.otitle{font-size:10px;font-weight:bold;color:#555;border-bottom:1px solid #e2e8f0;padding-bottom:4px;margin-bottom:5px}
.orow{width:100%;border-collapse:collapse;margin-bottom:2px}
.orow td{font-size:11px;padding:1px 0}
.orow td:first-child{color:#888;width:55px}
.orow td:last-child{font-weight:bold;color:#333;text-align:right}
.total td:first-child{font-weight:bold;color:#333}
.total td:last-child{font-size:17px;color:#1a73e8}
.lbl{font-size:10px;font-weight:bold;color:#555;margin-bottom:3px}
.sel{width:100%;padding:5px 7px;font-size:12px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;border:2px solid #d2d9e6;border-radius:4px;color:#333;background:#fff;outline:none;cursor:pointer;margin-bottom:8px}
.sel:focus{border-color:#1a73e8}
.pb{width:100%;padding:7px;background:#1a73e8;color:#fff;border:none;border-radius:4px;font-size:13px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-weight:bold;cursor:pointer;margin-bottom:5px}
.pb:hover{background:#1557b0}
.bb{width:100%;padding:5px;background:#fff;border:1px solid #d2d9e6;border-radius:4px;font-size:11px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;color:#888;cursor:pointer;margin-bottom:5px}
.bb:hover{background:#f7f8fc}
.sec{text-align:center;font-size:10px;color:#aaa}
.loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4)}
.lbox{position:absolute;top:50%;left:50%;margin:-20px 0 0 -60px;background:#fff;border-radius:6px;padding:12px 20px;font-size:12px;color:#333;text-align:center}
</style>
</head>
<body>
<div class="hd">MMSoft &nbsp; 카드 결제</div>
<div class="card">
  <div class="obox">
    <div class="otitle">주문 정보</div>
    <table class="orow"><tr><td>상품명</td><td id="dGoods">-</td></tr></table>
    <table class="orow"><tr><td>충전 ID</td><td id="dId">-</td></tr></table>
    <table class="orow total"><tr><td>결제 금액</td><td id="dPrice">-</td></tr></table>
  </div>
  <div class="lbl">할부 개월 선택</div>
  <select id="inst" class="sel">
    <option value="0">일시불</option>
    <option value="2">2개월</option>
    <option value="3">3개월</option>
    <option value="4">4개월</option>
    <option value="5">5개월</option>
    <option value="6">6개월</option>
    <option value="7">7개월</option>
    <option value="8">8개월</option>
    <option value="9">9개월</option>
    <option value="10">10개월</option>
    <option value="11">11개월</option>
    <option value="12">12개월</option>
  </select>
  <button type="button" class="pb" onclick="goOpen()">카드 결제하기</button>
  <button type="button" class="bb" onclick="history.back()">← 금액 변경</button>
  <div class="sec">KSNet 안심결제 · SSL 암호화</div>
</div>
<div class="loading" id="loading"><div class="lbox">결제창 준비 중...</div></div>

<!-- KSPayWeb Form (결제 결과 수신) -->
<form name="KSPayWeb" action="/manyman/result.asp" method="post" style="display:none">
  <input type="hidden" name="reAuthyn" value=""><input type="hidden" name="reTrno"   value="">
  <input type="hidden" name="reTrddt"  value=""><input type="hidden" name="reTrdtm"  value="">
  <input type="hidden" name="reAuthno" value=""><input type="hidden" name="reOrdno"  value="">
  <input type="hidden" name="reMsg1"   value=""><input type="hidden" name="reMsg2"   value="">
  <input type="hidden" name="reAmt"    value=""><input type="hidden" name="reTemp_v" value="">
  <input type="hidden" name="reIsscd"  value=""><input type="hidden" name="reAqucd"  value="">
  <input type="hidden" name="reRemark" value=""><input type="hidden" name="reResult" value="">
  <input type="hidden" name="a" id="kpId"    value="">
  <input type="hidden" name="b" id="kpPrice" value="">
  <input type="hidden" name="c" value=""><input type="hidden" name="d" value="">
</form>

<!-- authFrmFrame (KSPay 팝업으로 전송) -->
<div style="display:none">
<form name="authFrmFrame" target="AuthFrame" method="post">
  <input type="hidden" name="sndStoreid"        value="2900100006">
  <input type="hidden" name="sndBackUrl"         value="">
  <input type="hidden" name="sndReply"           id="sndReply" value="">
  <input type="hidden" name="sndPaymethod"       value="10000">
  <input type="hidden" name="sndOrdernumber"     value="">
  <input type="hidden" name="sndGoodname"        value="">
  <input type="hidden" name="madeCompany"        value="">
  <input type="hidden" name="madeCountry"        value="">
  <input type="hidden" name="sndInstallmenttype" value="">
  <input type="hidden" name="sndAmount"          value="">
  <input type="hidden" name="sndOrdername"       value="">
  <input type="hidden" name="sndAllregid"        value="7109051018914">
  <input type="hidden" name="sndEmail"           value="">
  <input type="hidden" name="sndMobile"          value="">
  <input type="hidden" name="sndInteresttype"    value="NONE">
  <input type="hidden" name="sndCurrencytype"    value="WON">
  <input type="hidden" name="sndCashbag"         value="0">
  <input type="hidden" name="sndWptype"          value="1">
  <input type="hidden" name="sndAdulttype"       value="1">
  <input type="hidden" name="sndStoreName"       value="엠엠소프트">
  <input type="hidden" name="sndStoreNameEng"    value="manyman_soft">
  <input type="hidden" name="sndStoreDomain"     value="http://www.mmsoft.co.kr">
</form>
</div>
<IFRAME id="AuthFrame" name="AuthFrame" style="display:none" src="/manyman/dummy.html"></IFRAME>

<script>
/* IE 호환 쿼리 파라미터 파싱 (URLSearchParams 미사용) */
function gp(n){var s=window.location.search.substring(1).split('&');for(var i=0;i<s.length;i++){var p=s[i].split('=');if(decodeURIComponent(p[0])===n)return p.length>1?decodeURIComponent(p[1].replace(/\+/g,' ')):''}return ''}
function comma(n){var s=String(n),r='',c=0;for(var i=s.length-1;i>=0;i--){r=s.charAt(i)+r;if(++c%3===0&&i!==0)r=','+r}return r}

var goods  = gp('goods') || 'SMS';
var price  = parseInt(gp('price'), 10) || 0;
var userId = gp('id')    || '';
var email  = gp('email') || '';
var phone  = gp('phone') || '';

document.getElementById('dGoods').innerHTML = goods;
document.getElementById('dId').innerHTML    = userId || '-';
document.getElementById('dPrice').innerHTML = comma(price) + '원';
document.getElementById('kpId').value       = userId;
document.getElementById('kpPrice').value    = price;
document.getElementById('sndReply').value   =
  window.location.protocol + '//' + window.location.host + '/manyman/KSPayRcv.asp';

function makeOrdNum(){
  var d=new Date();
  function p(n,l){var s=String(n);while(s.length<(l||2))s='0'+s;return s}
  return String(d.getFullYear())+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds())+p(d.getMilliseconds(),3)+p(Math.floor(Math.random()*999999),6);
}

function goOpen(){
  var inst=document.getElementById('inst').value;
  document.authFrmFrame.sndOrdernumber.value     = makeOrdNum();
  document.authFrmFrame.sndGoodname.value        = goods;
  document.authFrmFrame.sndInstallmenttype.value = inst;
  document.authFrmFrame.sndAmount.value          = price;
  document.authFrmFrame.sndOrdername.value       = userId;
  document.authFrmFrame.sndEmail.value           = email;
  document.authFrmFrame.sndMobile.value          = phone.replace(/-/g,'');
  var h=420,w=400,left=Math.floor(screen.width/2-w/2),top=Math.floor(screen.height/2-h/2);
  document.getElementById('loading').style.display='block';
  window.open('about:blank','AuthFrmUp','height='+h+',width='+w+',status=yes,scrollbars=no,resizable=no,left='+left+',top='+top);
  document.authFrmFrame.target='AuthFrmUp';
  document.authFrmFrame.action='https://kspay.ksnet.to/store/KSPayWebV1.3/KSPayWeb.jsp';
  document.authFrmFrame.submit();
}
function goResult(){
  document.getElementById('loading').style.display='none';
  document.KSPayWeb.target='';
  document.KSPayWeb.submit();
}
function paramSet(authyn,trno,trdt,trtm,authno,ordno,msg1,msg2,amt,temp_v,isscd,aqucd,remark,result){
  document.KSPayWeb.reAuthyn.value=authyn; document.KSPayWeb.reTrno.value=trno;
  document.KSPayWeb.reTrddt.value=trdt;   document.KSPayWeb.reTrdtm.value=trtm;
  document.KSPayWeb.reAuthno.value=authno; document.KSPayWeb.reOrdno.value=ordno;
  document.KSPayWeb.reMsg1.value=msg1;    document.KSPayWeb.reMsg2.value=msg2;
  document.KSPayWeb.reAmt.value=amt;      document.KSPayWeb.reTemp_v.value=temp_v;
  document.KSPayWeb.reIsscd.value=isscd;  document.KSPayWeb.reAqucd.value=aqucd;
  document.KSPayWeb.reRemark.value=remark; document.KSPayWeb.reResult.value=result;
}
</script>
</body>
</html>
