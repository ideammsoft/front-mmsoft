<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>엠엠소프트 - 충전</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;max-width:502px;overflow-x:hidden}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#eef2f7;padding:5px;font-size:11px}
.hd{background:#1a73e8;color:#fff;text-align:center;padding:5px;border-radius:4px 4px 0 0;font-size:12px;font-weight:bold}
.card{background:#fff;border:1px solid #d0d8e8;border-radius:0 0 4px 4px;padding:7px}
.notice{background:#e8f0fe;border-left:3px solid #1a73e8;border-radius:3px;padding:4px 6px;margin-bottom:6px;font-size:10px;color:#3c4858}
.lbl{font-size:10px;font-weight:bold;color:#555;margin-bottom:2px}
.aw{position:relative;margin-bottom:4px}
.ai{width:100%;padding:4px 24px 4px 6px;font-size:16px;font-weight:bold;color:#1a73e8;border:2px solid #d2d9e6;border-radius:4px;text-align:right;outline:none;font-family:'맑은 고딕','Malgun Gothic',sans-serif}
.ai:focus{border-color:#1a73e8}
.au{position:absolute;right:5px;top:50%;margin-top:-5px;font-size:10px;color:#888}
.err{display:none;color:#e53e3e;font-size:10px;margin-bottom:3px}
.qg{width:100%;border-collapse:collapse;margin-bottom:3px}
.qg td{width:25%;padding:0 1px}
.qg td:first-child{padding-left:0}
.qg td:last-child{padding-right:0}
.qb{width:100%;padding:3px 0;background:#f7f8fc;border:1px solid #d2d9e6;border-radius:3px;font-size:10px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-weight:bold;color:#444;cursor:pointer}
.qb:hover{background:#e8f0fe;border-color:#1a73e8;color:#1a73e8}
.rb{width:100%;padding:3px;background:#fff;border:1px dashed #ccc;border-radius:3px;font-size:10px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;color:#999;cursor:pointer;margin-bottom:5px}
.rb:hover{border-color:#e53e3e;color:#e53e3e}
.pb{width:100%;padding:7px;background:#1a73e8;color:#fff;border:none;border-radius:4px;font-size:13px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-weight:bold;cursor:pointer}
.pb:hover{background:#1557b0}
.msg{display:none;background:#fff8e1;border:2px solid #f59e0b;border-radius:6px;padding:14px 10px;text-align:center;font-size:12px;color:#333;line-height:1.8}
.msg b{font-size:14px;color:#d97706}
.mbtn{margin-top:10px;padding:6px 20px;background:#e53e3e;color:#fff;border:none;border-radius:4px;font-size:12px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-weight:bold;cursor:pointer}
.mbtn:hover{background:#c53030}
</style>
</head>
<body>
<div class="hd">MMSoft &nbsp; 문자메시지 충전</div>
<div id="main" class="card">
  <div class="notice">* 충전방식은 카드결재와 무통장입금만 가능합니다.<br>* 한번에 최대 5000건까지 발송가능합니다.<br>* 문자 메시지를 발송하시기 위해서는 요금이 충전되어 있어야합니다.<br>* 최소 결제 단위는 1만원입니다.</div>
  <div class="lbl">충전 금액</div>
  <div class="aw">
    <input type="text" id="price" class="ai" value="10000">
    <span class="au">원</span>
  </div>
  <p class="err" id="err">최소 결제 금액은 10,000원입니다.</p>
  <table class="qg"><tr>
    <td><button type="button" class="qb" onclick="add(10000)">+1만원</button></td>
    <td><button type="button" class="qb" onclick="add(50000)">+5만원</button></td>
    <td><button type="button" class="qb" onclick="add(100000)">+10만원</button></td>
    <td><button type="button" class="qb" onclick="add(500000)">+50만원</button></td>
  </tr></table>
  <button type="button" class="rb" onclick="rst()">금액 초기화</button>
  <button type="button" class="pb" onclick="go()">결&nbsp;&nbsp;제</button>
</div>
<div id="msgBox" class="card msg">
  <b>&#9432; 결제창이 새 브라우저에서 열렸습니다.</b><br><br>
  새로 열린 브라우저에서 결제를 완료해 주세요.<br>
  결제가 끝나면 이 창은 닫아주세요.
  <br>
  <button type="button" class="mbtn" onclick="window.close()">이 창 닫기</button>
</div>
<script>
function gp(n){var s=window.location.search.substring(1).split('&');for(var i=0;i<s.length;i++){var p=s[i].split('=');if(decodeURIComponent(p[0])===n)return p.length>1?decodeURIComponent(p[1].replace(/\+/g,' ')):''}return ''}
var uid=gp('id'),ph=gp('phone'),em=gp('email')||'man@mmsoft.co.kr';
function add(v){var el=document.getElementById('price');el.value=(parseInt(el.value,10)||0)+v;he()}
function rst(){document.getElementById('price').value=10000;he()}
function he(){var el=document.getElementById('err');el.style.display='none';el.innerHTML='최소 결제 금액은 10,000원입니다.'}
function go(){
  var price=parseInt(document.getElementById('price').value,10),el=document.getElementById('err');
  if(!price||price<10000){el.innerHTML='최소 결제 금액은 10,000원입니다.';el.style.display='block';return}
  if(price%10000!==0){el.innerHTML='10,000원 단위로 입력해 주세요.';el.style.display='block';return}
  var url='/manyman/authfrm.html?goods=SMS&price='+price+'&id='+encodeURIComponent(uid)+'&email='+encodeURIComponent(em)+'&phone='+encodeURIComponent(ph);
  window.open(url,'_blank');
  document.getElementById('main').style.display='none';
  document.getElementById('msgBox').style.display='block';
}
document.getElementById('price').onkeypress=function(e){var ev=e||window.event,k=ev.keyCode||ev.which;if(k===13){go();return false}if(k<48||k>57){ev.returnValue=false;return false}};
</script>
</body>
</html>
