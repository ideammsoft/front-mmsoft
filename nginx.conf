server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------
    # /manyman/ 결제 페이지 라우팅
    # ---------------------------------------------------------------

    location = /manyman/index.asp {
        return 302 /manyman/index-compact.html$is_args$args;
    }

    location = /manyman/authfrm.asp {
        return 302 /manyman/authfrm.html$is_args$args;
    }

    location = /manyman/dummy.asp {
        return 302 /manyman/dummy.html;
    }

    location = /manyman/KSPayRcv.asp {
        proxy_pass         http://mm-gateway-server:1882/api/payment/kspayrec;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Content-Type      $http_content_type;
        proxy_pass_request_body on;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  X-Content-Type-Options;
    }

    location = /manyman/KSPayResult.asp {
        proxy_pass         http://mm-gateway-server:1882/api/payment/kspayresult;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Content-Type      $http_content_type;
        proxy_pass_request_body on;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  X-Content-Type-Options;
    }

    location = /manyman/KSPayMobileRcv.asp {
        proxy_pass         http://mm-gateway-server:1882/api/payment/kspayresult-mobile;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Content-Type      $http_content_type;
        proxy_pass_request_body on;
    }

    location = /manyman/result.asp {
        proxy_pass         http://mm-gateway-server:1882/api/payment/result;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Content-Type      $http_content_type;
        proxy_pass_request_body on;
    }

    location /manyman/ {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /manyman/index.html;
    }

    # ---------------------------------------------------------------
    # 자동업데이트 파일 다운로드 (정적 파일 직접 제공, SPA fallback 없음)
    # ---------------------------------------------------------------
    location /autoupdate/ {
        root  /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # ---------------------------------------------------------------
    # *.asp 요청 → 홈 301 리다이렉트
    # (위의 location = /manyman/*.asp exact match들이 먼저 처리되므로 결제 경로는 영향 없음)
    # ---------------------------------------------------------------
    location ~* \.asp$ {
        return 301 /;
    }

    # ---------------------------------------------------------------
    # 기본 SPA (React) 라우팅
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /work_down/ {
        proxy_pass         http://mm-gateway-server:1882/work_down/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        add_header         Access-Control-Allow-Origin "*";
        add_header         Content-Disposition "attachment";
    }

    location /api/ {
        proxy_pass http://mm-gateway-server:1882;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /oauth2/ {
        proxy_pass http://mm-gateway-server:1882;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /login/oauth2/ {
        proxy_pass http://mm-gateway-server:1882;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /images/pds/ {
        proxy_pass http://mm-admin-service:1994/images/pds/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /images/ {
        proxy_pass http://mm-gateway-server:1882;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 챗봇 프록시 (web-rag:8001 → /chat/ 경로로 HTTPS 접근 가능)
    location /chat/ {
        proxy_pass         http://web-rag:8001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
